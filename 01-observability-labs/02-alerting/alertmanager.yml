global:
  resolve_timeout: 5m

route:
  receiver: "local-receiver"
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 30s
  # Keep routing simple for a local test lab

receivers:
  - name: "local-receiver"
    webhook_configs:
      - url: "http://receiver:5001/alerts"
        send_resolved: true
