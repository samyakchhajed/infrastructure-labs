services:
  app:
    build: .
    container_name: metrics_app
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - metrics_network

  prometheus:
    image: prom/prometheus:v3.13.0
    container_name: metrics_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - metrics_network

  grafana:
    image: grafana/grafana:13.0.3
    container_name: metrics_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - metrics_network

networks:
  metrics_network:
    driver: bridge
